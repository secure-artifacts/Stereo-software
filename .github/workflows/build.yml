name: Build macOS App

on:
  push:
    tags:
      - 'v*'           # 推送標籤觸發（自動創建 Release）
  workflow_dispatch:    # 👈 這行就是手動「按按鈕」觸發功能

jobs:
  macos-build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Python Setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pyinstaller pedalboard

      - name: Build App
        run: python build_app.py

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Stereo Generator" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "StereoGenerator.app" 175 120 \
            --app-drop-link 425 120 \
            "dist/StereoGenerator_Installer.dmg" \
            "dist/StereoGenerator.app"

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: macOS-DMG
          path: dist/StereoGenerator_Installer.dmg

      - name: Release Asset (Optional)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/StereoGenerator_Installer.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
