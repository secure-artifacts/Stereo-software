name: Build macOS App

on:
  push:
    tags:
      - 'v*' # 當你推送標籤如 v1.0 時觸發

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: 檢出代碼
        uses: actions/checkout@v3

      - name: 設置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝依賴
        run: |
          pip install pyinstaller pedalboard

      - name: 運行打包
        run: |
          # 這裡直接調用剛才寫好的本地腳本
          python build_app.py

      - name: 製作 DMG 安裝包
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Stereo Generator" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "立体声空间生成器.app" 175 120 \
            --app-drop-link 425 120 \
            "dist/StereoGenerator_Installer.dmg" \
            "dist/立体声空间生成器.app"

      - name: 發布到 Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/StereoGenerator_Installer.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
